    <!DOCTYPE html>

    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JSON Editor</title>

        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #f5f5f5;
                font-family: Arial, sans-serif;
            }

            .container {
                width: 600px;
                text-align: center;
            }

            textarea {
                width: 100%;
                height: 70vh;
                padding: 15px;
                border-radius: 10px;
                border: none;
                font-family: monospace;
                font-size: 14px;
                background: #1e1e1e;
                color: #00ff9d;
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
                resize: vertical;
            }

            button {
                margin-top: 15px;
                margin-right: 20px;
                padding: 10px 25px;
                border: none;
                background: #c59d5f;
                color: white;
                font-size: 15px;
                border-radius: 6px;
                cursor: pointer;
            }

            button:hover {
                background: #a88545;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <button onclick="saveJSON()">Preview</button>
            <button onclick="loadDefault()">Default</button>
            <br><br>
            <textarea id="editor"> </textarea>


        </div>
        <script>
            function init() {
                const loggedin = sessionStorage.getItem('loggedin');
                loggedin ?  loadData() : window.location.href = 'login';
            }
            init();

            async function loadData() {

                try {
                    const data = localStorage.getItem("data");
                    const jsonData = data ? JSON.parse(data) : await loadJSON();
                    // populate textarea nicely
                    document.getElementById("editor").value = JSON.stringify(jsonData, null, 2);
                } catch (err) {
                    alert("Failed to load JSON. Make sure you are running a local server.");
                    console.error(err);
                }
            }

            async function loadJSON() {
                try {
                    const response = await fetch("data.json");
                    const data = await response.json();
                    return data;
                } catch (err) {
                    alert("Failed to load JSON. Make sure you are running a local server.");
                    console.error(err);
                }
            }



            async function loadDefault() {
                const data = await loadJSON()
                localStorage.setItem("data", JSON.stringify(data));
                loadData();
            }

            function saveJSON() {
                const text = document.getElementById("editor").value;
                try {
                    const json = JSON.parse(text);
                    localStorage.setItem("data", JSON.stringify(json));
                    window.location.href = 'index.html';
                }
                catch (e) {
                    alert("Invalid JSON"); //
                }
            }

        </script>
    </body>

    </html>
</body>
